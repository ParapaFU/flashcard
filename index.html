<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- font Roboto, noto sans, noto sans jp -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css dan reset -->
    <link rel="stylesheet" href="src/css/reset.css" />
    <link rel="stylesheet" href="src/css/main.css" />
    <title>Flashcard</title>
  </head>
  <body>
    <header class="header">
      <h1>FlashCard Folders</h1>
      <button id="add-card-btn" class="add-card">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="M19 12.998h-6v6h-2v-6H5v-2h6v-6h2v6h6z"
          />
        </svg>
        <span>Tambah Card</span>
      </button>
    </header>
    <main>
      <section id="form-card-container" class="form-new-card-container">
        <form id="form-card" class="form-card">
          <h2>Tambah Card Baru</h2>
          <div class="input-kata">
            <label for="input-text-front">Front:</label>
            <input
              type="text"
              placeholder="Kata card"
              id="input-text-front"
              class="input-text"
            />
            <label for="input-text-behind">Behind:</label>
            <input
              type="text"
              placeholder="Kata card"
              id="input-text-behind"
              class="input-text"
            />
          </div>
          <div class="btn">
            <button type="button" id="cancel-btn" class="cancel">Batal</button>
            <button type="submit" id="create-btn" class="make-card">
              Buat Card
            </button>
          </div>
        </form>
      </section>
      <section id="container-data" class="list-items">
        <div class="item">
          <div class="text">
            <p class="text-front">Mana</p>
          </div>
          <button class="delete">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="1.5em"
              height="1.5em"
              viewBox="0 0 24 24"
            >
              <path d="M0 0h24v24H0z" fill="none" />
              <g
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              >
                <path
                  stroke-dasharray="24"
                  d="M12 20h5c0.5 0 1 -0.5 1 -1v-14M12 20h-5c-0.5 0 -1 -0.5 -1 -1v-14"
                >
                  <animate
                    fill="freeze"
                    attributeName="stroke-dashoffset"
                    dur="0.5s"
                    values="24;0"
                  />
                </path>
                <path stroke-dasharray="18" stroke-dashoffset="18" d="M4 5h16">
                  <animate
                    fill="freeze"
                    attributeName="stroke-dashoffset"
                    begin="0.5s"
                    dur="0.3s"
                    to="0"
                  />
                </path>
                <path
                  stroke-dasharray="10"
                  stroke-dashoffset="10"
                  d="M10 4h4M10 9v7M14 9v7"
                >
                  <animate
                    fill="freeze"
                    attributeName="stroke-dashoffset"
                    begin="0.8s"
                    dur="0.2s"
                    to="0"
                  />
                </path>
              </g>
            </svg>
          </button>
        </div>
      </section>
      <section class="empty-state">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="72"
          height="72"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            d="M4 20q-.825 0-1.412-.587T2 18V6q0-.825.588-1.412T4 4h6l2 2h8q.825 0 1.413.588T22 8v10q0 .825-.587 1.413T20 20zm0-2h16V8h-8.825l-2-2H4zm0 0V6z"
          />
        </svg>
        <p>Belum ada folder. Klik tombol "Tambah Folder" untuk memulai.</p>
      </section>
    </main>

    <script src="src/js/main.js"></script>
  </body>
</html>
